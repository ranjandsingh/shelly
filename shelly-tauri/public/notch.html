<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #2a2a2a;
    border-radius: 0 0 10px 10px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .notch {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    gap: 6px;
    transition: background 0.15s;
  }
  .notch:hover {
    background: #3a3a3a;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #666;
  }
  .dot.working { background: #4a9eff; }
  .dot.waiting { background: #f5a623; }
  .dot.completed { background: #4caf50; }
  .dot.interrupted { background: #ef5350; }
</style>
</head>
<body>
  <div class="notch" id="notch">
    <div class="dot" id="dot-0"></div>
  </div>
  <script>
    // Import Tauri APIs
    const { getCurrentWindow } = window.__TAURI__.window;
    const { listen } = window.__TAURI__.event;
    const { invoke } = window.__TAURI__.core;

    const notchEl = document.getElementById('notch');

    // Click notch -> toggle panel
    notchEl.addEventListener('click', async () => {
      console.log('[Notch] clicked -> showing main panel');
      try {
        // Emit event to toggle the main panel
        const { emit } = window.__TAURI__.event;
        await emit('notch-clicked', {});
      } catch (e) {
        console.error('[Notch] click error:', e);
      }
    });

    // Hover notch -> also show panel
    let hoverTimer = null;
    notchEl.addEventListener('mouseenter', () => {
      hoverTimer = setTimeout(async () => {
        console.log('[Notch] hover -> showing main panel');
        try {
          const { emit } = window.__TAURI__.event;
          await emit('notch-clicked', {});
        } catch (e) {
          console.error('[Notch] hover error:', e);
        }
      }, 300);
    });
    notchEl.addEventListener('mouseleave', () => {
      if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
    });

    // Listen for session status updates to color the dots
    listen('sessions-updated', (event) => {
      const sessions = event.payload;
      if (!Array.isArray(sessions)) return;
      const notch = document.getElementById('notch');
      // Clear existing dots
      notch.innerHTML = '';
      sessions.forEach((s) => {
        const dot = document.createElement('div');
        dot.className = 'dot';
        const status = (s.status || 'Idle').toLowerCase();
        if (status === 'working') dot.classList.add('working');
        else if (status === 'waitingforinput') dot.classList.add('waiting');
        else if (status === 'taskcompleted') dot.classList.add('completed');
        else if (status === 'interrupted') dot.classList.add('interrupted');
        notch.appendChild(dot);
      });
    });

    console.log('[Notch] initialized');
  </script>
</body>
</html>
