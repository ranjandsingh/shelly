<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #2a2a2a;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
    transition: background 0.3s;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  body.shrunk {
    background: #333;
  }

  .greeting-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    overflow: hidden;
    max-width: 150px;
    transition: max-width 0.5s ease, opacity 0.4s;
  }
  .greeting-wrap.hidden {
    max-width: 0;
    opacity: 0;
  }
  .greeting-icon {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .greeting-text {
    color: #ccc;
    font-size: 11px;
    font-weight: 500;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    white-space: nowrap;
  }

  .dots {
    display: flex;
    gap: 3px;
    align-items: center;
  }
  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #555;
  }
  .dot.working { background: #ffa726; }
  .dot.waiting { background: #ffa726; }
  .dot.completed { background: #4caf50; }
  .dot.interrupted { background: #ef5350; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spinner {
    width: 5px;
    height: 5px;
    border: 1px solid transparent;
    border-top-color: #ffa726;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
</style>
</head>
<body>
  <div class="greeting-wrap" id="greeting">
    <img class="greeting-icon" src="icon.png" alt="">
    <span class="greeting-text">Hello!</span>
  </div>
  <div class="dots" id="dots"></div>

  <script>
    let isShrunk = false;

    // After 3s, hide greeting and shrink notch via Rust
    setTimeout(() => {
      document.getElementById('greeting').classList.add('hidden');
      setTimeout(() => {
        if (window.__TAURI__) {
          window.__TAURI__.core.invoke('shrink_notch');
          document.body.classList.add('shrunk');
          isShrunk = true;
        }
      }, 500); // wait for CSS transition
    }, 3000);

    // Click -> toggle panel
    document.body.addEventListener('click', () => {
      if (window.__TAURI__) window.__TAURI__.core.invoke('toggle_panel');
    });

    // Hover -> expand notch back to full size, then show panel
    let hoverTimer = null;
    document.body.addEventListener('mouseenter', () => {
      if (isShrunk && window.__TAURI__) {
        window.__TAURI__.core.invoke('expand_notch');
        document.body.classList.remove('shrunk');
      }
      hoverTimer = setTimeout(() => {
        if (window.__TAURI__) window.__TAURI__.core.invoke('show_panel');
      }, 300);
    });
    document.body.addEventListener('mouseleave', () => {
      if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
      // Shrink back if panel isn't visible
      if (isShrunk && window.__TAURI__) {
        setTimeout(() => {
          window.__TAURI__.core.invoke('shrink_notch');
          document.body.classList.add('shrunk');
        }, 500);
      }
    });

    // Status updates
    if (window.__TAURI__) {
      window.__TAURI__.event.listen('sessions-updated', (event) => {
        const sessions = event.payload;
        if (!Array.isArray(sessions)) return;
        const dotsEl = document.getElementById('dots');
        dotsEl.innerHTML = '';
        sessions.forEach((s) => {
          const status = (s.status || 'Idle');
          if (status === 'Working') {
            const el = document.createElement('div');
            el.className = 'spinner';
            dotsEl.appendChild(el);
          } else {
            const dot = document.createElement('div');
            dot.className = 'dot';
            if (status === 'WaitingForInput') dot.classList.add('waiting');
            else if (status === 'TaskCompleted') dot.classList.add('completed');
            else if (status === 'Interrupted') dot.classList.add('interrupted');
            dotsEl.appendChild(dot);
          }
        });
      });
    }
  </script>
</body>
</html>
