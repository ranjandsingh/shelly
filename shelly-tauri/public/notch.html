<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  .notch {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    height: 24px;
    margin-top: 0;
    gap: 5px;
    background: rgba(30, 30, 30, 0.85);
    border-radius: 0 0 10px 10px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-top: none;
    transition: background 0.15s, transform 0.15s;
  }
  .notch:hover {
    background: rgba(50, 50, 50, 0.95);
    transform: scaleX(1.05);
  }
  .greeting {
    color: #e0e0e0;
    font-size: 11px;
    font-weight: 500;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    opacity: 0;
    transition: opacity 0.3s;
    display: none;
  }
  .greeting.show {
    display: inline;
    opacity: 1;
  }
  .dots {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #555;
  }
  .dot.working { background: #ffa726; }
  .dot.waiting { background: #ffa726; }
  .dot.completed { background: #4caf50; }
  .dot.interrupted { background: #ef5350; }
  /* Spinning animation for working dot */
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spinner {
    width: 10px;
    height: 10px;
    border: 1.5px solid transparent;
    border-top-color: #ffa726;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
</style>
</head>
<body>
  <div class="notch" id="notch">
    <span class="greeting show" id="greeting">Hello!</span>
    <div class="dots" id="dots"></div>
  </div>
  <script>
    const notchEl = document.getElementById('notch');
    const greetingEl = document.getElementById('greeting');
    const dotsEl = document.getElementById('dots');

    // Hide greeting after 3 seconds
    setTimeout(() => {
      greetingEl.classList.remove('show');
      setTimeout(() => { greetingEl.style.display = 'none'; }, 300);
    }, 3000);

    // Click -> tell Rust to toggle panel
    notchEl.addEventListener('click', () => {
      if (window.__TAURI__) {
        window.__TAURI__.core.invoke('toggle_panel');
      }
    });

    // Hover -> tell Rust to show panel
    let hoverTimer = null;
    notchEl.addEventListener('mouseenter', () => {
      hoverTimer = setTimeout(() => {
        if (window.__TAURI__) {
          window.__TAURI__.core.invoke('show_panel');
        }
      }, 200);
    });
    notchEl.addEventListener('mouseleave', () => {
      if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
    });

    // Listen for status updates
    if (window.__TAURI__) {
      window.__TAURI__.event.listen('sessions-updated', (event) => {
        const sessions = event.payload;
        if (!Array.isArray(sessions)) return;
        dotsEl.innerHTML = '';
        sessions.forEach((s) => {
          const status = (s.status || 'Idle');
          if (status === 'Working') {
            const spinner = document.createElement('div');
            spinner.className = 'spinner';
            dotsEl.appendChild(spinner);
          } else {
            const dot = document.createElement('div');
            dot.className = 'dot';
            if (status === 'WaitingForInput') dot.classList.add('waiting');
            else if (status === 'TaskCompleted') dot.classList.add('completed');
            else if (status === 'Interrupted') dot.classList.add('interrupted');
            dotsEl.appendChild(dot);
          }
        });
      });
    }
  </script>
</body>
</html>
