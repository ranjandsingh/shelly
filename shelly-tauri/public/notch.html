<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
  }
  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  .pill {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: 100%;
    height: 100%;
    background: #2d2d2d;
    border-radius: 0 0 8px 8px;
  }
  .greeting-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    overflow: hidden;
    max-width: 120px;
    transition: max-width 0.5s ease, opacity 0.4s;
  }
  .greeting-wrap.hidden { max-width: 0; opacity: 0; }
  .greeting-icon { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .greeting-text {
    color: #bbb; font-size: 9px; font-weight: 500;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    white-space: nowrap;
  }
  .dots { display: flex; gap: 3px; align-items: center; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: #555; }
  .dot.working { background: #ffa726; }
  .dot.waiting { background: #ffa726; }
  .dot.completed { background: #4caf50; }
  .dot.interrupted { background: #ef5350; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spinner {
    width: 5px; height: 5px;
    border: 1px solid transparent; border-top-color: #ffa726;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
</style>
</head>
<body>
  <div class="pill">
    <div class="greeting-wrap" id="greeting">
      <img class="greeting-icon" src="icon.png" alt="">
      <span class="greeting-text">Hello!</span>
    </div>
    <div class="dots" id="dots"></div>
  </div>
  <script>
    setTimeout(() => {
      document.getElementById('greeting').classList.add('hidden');
      setTimeout(() => {
        if (window.__TAURI__) window.__TAURI__.core.invoke('shrink_notch');
      }, 500);
    }, 3000);

    document.body.addEventListener('click', () => {
      if (window.__TAURI__) window.__TAURI__.core.invoke('toggle_panel');
    });

    let hoverTimer = null;
    document.body.addEventListener('mouseenter', () => {
      if (window.__TAURI__) window.__TAURI__.core.invoke('expand_notch');
      hoverTimer = setTimeout(() => {
        if (window.__TAURI__) window.__TAURI__.core.invoke('show_panel');
      }, 300);
    });
    document.body.addEventListener('mouseleave', () => {
      if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
      setTimeout(() => {
        if (window.__TAURI__) window.__TAURI__.core.invoke('shrink_notch');
      }, 500);
    });

    if (window.__TAURI__) {
      window.__TAURI__.event.listen('sessions-updated', (event) => {
        const sessions = event.payload;
        if (!Array.isArray(sessions)) return;
        const dotsEl = document.getElementById('dots');
        dotsEl.innerHTML = '';
        sessions.forEach((s) => {
          const status = (s.status || 'Idle');
          if (status === 'Working') {
            const el = document.createElement('div');
            el.className = 'spinner';
            dotsEl.appendChild(el);
          } else {
            const dot = document.createElement('div');
            dot.className = 'dot';
            if (status === 'WaitingForInput') dot.classList.add('waiting');
            else if (status === 'TaskCompleted') dot.classList.add('completed');
            else if (status === 'Interrupted') dot.classList.add('interrupted');
            dotsEl.appendChild(dot);
          }
        });
      });
    }
  </script>
</body>
</html>
