<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
        #terminal { width: 100%; height: 100%; padding-left: 6px; }
        /* Dark scrollbar for xterm */
        .xterm-viewport::-webkit-scrollbar { width: 8px; }
        .xterm-viewport::-webkit-scrollbar-track { background: #1a1a1a; }
        .xterm-viewport::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #555; }
        #scroll-bottom-btn {
            display: none;
            position: fixed;
            bottom: 12px;
            right: 16px;
            width: 28px;
            height: 28px;
            border: 1px solid #555;
            border-radius: 6px;
            background: #2a2a2a;
            color: #aaa;
            font-size: 16px;
            line-height: 26px;
            text-align: center;
            cursor: pointer;
            z-index: 1000;
            opacity: 0.7;
            transition: opacity 0.15s;
        }
        #scroll-bottom-btn:hover { opacity: 1; background: #333; color: #ddd; }
    </style>
    <link rel="stylesheet" href="xterm.css">
</head>
<body>
    <div id="terminal"></div>
    <div id="scroll-bottom-btn" title="Scroll to bottom">&#x25BE;</div>
    <script src="xterm.js"></script>
    <script src="xterm-addon-fit.js"></script>
    <script>
        const term = new Terminal({
            theme: {
                background: '#1a1a1a',
                foreground: '#e6e6e6',
                cursor: '#e6e6e6',
                selectionBackground: '#44475a'
            },
            fontFamily: 'Cascadia Code, Consolas, monospace',
            fontSize: 11,
            cursorBlink: true,
            allowProposedApi: true
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        const terminalEl = document.getElementById('terminal');
        window.focusTerminal = function () {
            try { term.focus(); } catch (e) { console.error(e); }
        };
        terminalEl.addEventListener('mousedown', () => window.focusTerminal());
        terminalEl.addEventListener('pointerdown', () => window.focusTerminal());
        window.focusTerminal();

        // Scroll-to-bottom button & user-scroll tracking
        const scrollBtn = document.getElementById('scroll-bottom-btn');
        let userScrolledUp = false;
        let viewport = null;

        function isAtBottom() {
            if (!viewport) return true;
            return viewport.scrollTop + viewport.clientHeight >= viewport.scrollHeight - 1;
        }
        function updateScrollBtn() {
            scrollBtn.style.display = userScrolledUp ? 'block' : 'none';
        }

        // Detect user-initiated scrolling via wheel/scroll on the xterm viewport
        setTimeout(() => {
            viewport = term.element.querySelector('.xterm-viewport');
            if (viewport) {
                viewport.addEventListener('wheel', (e) => {
                    if (e.deltaY < 0) userScrolledUp = true;
                    requestAnimationFrame(() => {
                        if (isAtBottom()) userScrolledUp = false;
                        updateScrollBtn();
                    });
                }, { passive: true });
            }
        }, 0);

        scrollBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            userScrolledUp = false;
            term.scrollToBottom();
            updateScrollBtn();
            term.focus();
        });

        // Send input to C# host
        term.onData(data => {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(data);
            }
        });

        // Clipboard: Ctrl+V paste, Ctrl+C copy/SIGINT
        document.addEventListener('paste', e => {
            const text = e.clipboardData?.getData('text');
            if (text && window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(text);
            }
            e.preventDefault();
        });

        term.attachCustomKeyEventHandler(e => {
            if (e.ctrlKey && e.key === 'v' && e.type === 'keydown') {
                document.execCommand('paste');
                return false;
            }
            if (e.ctrlKey && e.key === 'c' && e.type === 'keydown') {
                if (term.hasSelection()) {
                    navigator.clipboard.writeText(term.getSelection());
                    term.clearSelection();
                    return false;
                }
            }
            return true;
        });

        // Handle resize — debounced to prevent feedback loop with ConPTY redraws.
        // The first resize fires immediately so ConPTY gets the real terminal size.
        let resizeTimer = null;
        let lastCols = 0;
        let lastRows = 0;
        function sendResize() {
            try {
                const savedTop = userScrolledUp && viewport ? viewport.scrollTop : -1;
                fitAddon.fit();
                if (savedTop >= 0 && viewport) {
                    viewport.scrollTop = savedTop;
                }
                if (term.cols !== lastCols || term.rows !== lastRows) {
                    lastCols = term.cols;
                    lastRows = term.rows;
                    console.log(`resize: ${lastCols}x${lastRows}`);
                    if (window.chrome && window.chrome.webview) {
                        window.chrome.webview.postMessage(JSON.stringify({
                            type: 'resize',
                            cols: term.cols,
                            rows: term.rows
                        }));
                    }
                }
            } catch(e) { console.error(`sendResize ERROR: ${e}`); }
        }
        const resizeObserver = new ResizeObserver(() => {
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(sendResize, 150);
        });
        resizeObserver.observe(document.getElementById('terminal'));
        // Send initial size immediately
        sendResize();

        // Functions called from C#
        let writeCount = 0;
        function terminalWriteBase64(b64) {
            writeCount++;
            try {
                const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
                console.log(`terminalWriteBase64 #${writeCount}: ${b64.length} b64 chars -> ${bytes.length} bytes`);
                const savedTop = userScrolledUp && viewport ? viewport.scrollTop : -1;
                term.write(bytes, () => {
                    if (savedTop >= 0 && viewport) {
                        viewport.scrollTop = savedTop;
                    }
                });
            } catch(e) {
                console.error(`terminalWriteBase64 ERROR: ${e}`);
            }
        }

        function terminalReset() {
            try {
                console.log('terminalReset called');
                term.reset();
            } catch(e) { console.error(`terminalReset ERROR: ${e}`); }
        }

        // Signal that JS is ready
        console.log('xterm.js initialized, cols=' + term.cols + ' rows=' + term.rows);

        function setFontSize(size) {
            try {
                console.log('setFontSize: ' + size);
                term.options.fontSize = size;
                fitAddon.fit();
            } catch(e) { console.error(`setFontSize ERROR: ${e}`); }
        }

        function terminalGetVisibleText() {
            try {
                const buffer = term.buffer.active;
                const rows = term.rows;
                const baseY = buffer.baseY;
                let lines = [];
                // Only read the bottom viewport (most recent output), not entire scrollback
                for (let i = baseY; i < baseY + rows; i++) {
                    const line = buffer.getLine(i);
                    if (line) lines.push(line.translateToString(true));
                }
                return lines.join('\n');
            } catch(e) { console.error(`terminalGetVisibleText ERROR: ${e}`); return ''; }
        }
    </script>
</body>
</html>
