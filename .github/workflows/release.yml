name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Re-release current version: move tag to main HEAD and rebuild (draft releases only)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  create-tag:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_build: ${{ steps.reconcile.outputs.should_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from config
        id: version
        run: |
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' src-tauri/tauri.conf.json | head -1)
          SHA=$(git rev-parse HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION at $SHA"

      - name: Reconcile tag and draft release
        id: reconcile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ inputs.force }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          SHA="${{ steps.version.outputs.sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          REMOTE_SHA=$(git ls-remote --tags origin "refs/tags/$TAG" | awk '{print $1}' || true)

          if [ -z "$REMOTE_SHA" ]; then
            echo "Tag $TAG does not exist — creating at $SHA."
            git tag -a "$TAG" -m "Release $TAG" "$SHA"
            git push origin "$TAG"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$REMOTE_SHA" = "$SHA" ]; then
            echo "Tag $TAG already points to $SHA — reusing."
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Tag exists on a different commit.
          if [ "$EVENT" != "workflow_dispatch" ] || [ "$FORCE" != "true" ]; then
            echo "Tag $TAG exists at $REMOTE_SHA but HEAD is $SHA."
            echo "Version was not bumped — skipping release build."
            echo "To re-release this version, run the workflow manually with force=true."
            echo "should_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Force path: move the tag, but refuse if the release was already published.
          STATE=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null || echo "missing")
          if [ "$STATE" = "false" ]; then
            echo "Release $TAG is already published — refusing to move the tag."
            echo "Bump the version in src-tauri/tauri.conf.json instead."
            exit 1
          fi

          if [ "$STATE" = "true" ]; then
            echo "Deleting existing draft release $TAG."
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes
          fi

          echo "Force-moving tag $TAG from $REMOTE_SHA to $SHA."
          git tag -fa "$TAG" -m "Release $TAG" "$SHA"
          git push --force origin "$TAG"
          echo "should_build=true" >> $GITHUB_OUTPUT

  build:
    needs: create-tag
    if: needs.create-tag.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.tag }}

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — required to produce latest.json + .sig artifacts
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ needs.create-tag.outputs.tag }}
          releaseName: 'Shelly ${{ needs.create-tag.outputs.tag }}'
          releaseBody: |
            See the assets below to download and install this version.

            > macOS builds are currently unsigned — right-click and select Open to bypass Gatekeeper.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Upload .sig files to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.create-tag.outputs.tag }}"
          find src-tauri/target -type f -name "*.sig" -print | while read -r sig; do
            echo "Uploading $sig"
            gh release upload "$TAG" "$sig" --repo "${{ github.repository }}" --clobber
          done

  publish:
    needs: [create-tag, build]
    if: needs.create-tag.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Compose and upload latest.json
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.create-tag.outputs.tag }}"
          VERSION="${{ needs.create-tag.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/$REPO/releases/download/$TAG"

          gh release download "$TAG" --repo "$REPO" --pattern '*.sig' --dir sigs

          WIN_SIG="sigs/Shelly_${VERSION}_x64-setup.exe.sig"
          MAC_SIG="sigs/Shelly.app.tar.gz.sig"
          for f in "$WIN_SIG" "$MAC_SIG"; do
            [ -f "$f" ] || { echo "::error::Missing $f"; exit 1; }
          done

          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the release page for details." \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg win_sig "$(cat "$WIN_SIG")" \
            --arg win_url "$BASE/Shelly_${VERSION}_x64-setup.exe" \
            --arg mac_sig "$(cat "$MAC_SIG")" \
            --arg mac_url "$BASE/Shelly_universal.app.tar.gz" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "darwin-x86_64":  { signature: $mac_sig, url: $mac_url },
                "darwin-aarch64": { signature: $mac_sig, url: $mac_url }
              }
            }' > latest.json

          gh release upload "$TAG" latest.json --repo "$REPO" --clobber

      - name: Publish release
        run: |
          gh release edit "${{ needs.create-tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --draft=false
