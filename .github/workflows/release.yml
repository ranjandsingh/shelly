name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: NotchyWindows/NotchyWindows.csproj

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Building version $TAG"

      - name: Publish (self-contained, x64)
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=${{ steps.version.outputs.version }} `
            -o ./publish

      - name: Create portable ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./artifacts | Out-Null
          Copy-Item portable/README.txt ./publish/README.txt
          Compress-Archive -Path ./publish/* -DestinationPath ./artifacts/NotchyWindows-${{ steps.version.outputs.version }}-portable-win-x64.zip

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} installer\NotchyWindows.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Notchy Windows v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
          files: |
            artifacts/NotchyWindows-${{ steps.version.outputs.version }}-setup.exe
            artifacts/NotchyWindows-${{ steps.version.outputs.version }}-portable-win-x64.zip
