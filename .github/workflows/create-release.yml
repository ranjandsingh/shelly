name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          VER="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "Next version: ${MAJOR}.${MINOR}.${PATCH}"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh pr create \
            --base main \
            --head "dev" \
            --title "Release v${VERSION}" \
            --body "## Release v${VERSION}

          Merging this PR will automatically:
          - Tag \`v${VERSION}\`
          - Build Tauri app for Windows and macOS
          - Publish GitHub Release with installers and auto-update manifest

          **Bump type:** ${{ inputs.bump }}" \
            --label "bump:${{ inputs.bump }}"
