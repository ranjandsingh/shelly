name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          # Read current version from tauri.conf.json
          CURRENT=$(grep -oP '"version":\s*"\K[^"]+' src-tauri/tauri.conf.json | head -1)
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Next version: $NEW"

      - name: Bump version in project files
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update tauri.conf.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json

          # Update Cargo.toml (only the [package] version, not dependencies)
          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml

          # Update package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin dev

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh pr create \
            --base main \
            --head "dev" \
            --title "Release v${VERSION}" \
            --body "## Release v${VERSION}

          Merging this PR will automatically:
          - Tag \`v${VERSION}\`
          - Build Tauri app for Windows and macOS
          - Publish GitHub Release with installers and auto-update manifest

          **Bump type:** ${{ inputs.bump }}"
